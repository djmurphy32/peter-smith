name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        # uses: pnpm/action-setup@v6
        uses: djmurphy32/pnpm-action-setup@fix-installing-new-versions

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm ci

      - name: Build project
        run: pnpm build

      - name: Type check
        run: pnpm tsc

      - name: Lint code
        run: pnpm lint
